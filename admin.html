<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV SaaS — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#060810;color:#f1f5f9;min-height:100vh;}
.card{background:rgba(17,24,39,.98);border:1px solid rgba(255,255,255,.08);border-radius:1.25rem;}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
.inp{background:#1e293b;border:2px solid #334155;border-radius:.75rem;padding:.7rem 1rem;color:#fff;font-size:.85rem;font-family:inherit;outline:none;width:100%;}
.inp:focus{border-color:#3b82f6;}
.btn{padding:.65rem 1.25rem;border-radius:.75rem;border:none;cursor:pointer;font-size:.8rem;font-weight:700;font-family:inherit;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;}
.btn-sm{padding:.4rem .8rem;font-size:.75rem;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#4b5563;padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.06);}
td{padding:.85rem 1rem;font-size:.82rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.stat-card{background:rgba(17,24,39,.98);border:1px solid rgba(255,255,255,.08);border-radius:1rem;padding:1.25rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="adm-login" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem">
  <div class="card" style="width:100%;max-width:360px;padding:2rem">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🛡️</div>
      <h1 style="font-size:1.25rem;font-weight:900;color:#f1f5f9">Admin SaaS</h1>
      <p style="font-size:.75rem;color:#4b5563;margin-top:.25rem">Acesso restrito</p>
    </div>
    <div id="adm-err" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;border-radius:.75rem;padding:.75rem;font-size:.8rem;margin-bottom:.75rem;display:none"></div>
    <input class="inp" id="adm-email" type="email" placeholder="Email admin" style="margin-bottom:.75rem">
    <input class="inp" id="adm-pass"  type="password" placeholder="Senha" style="margin-bottom:.75rem">
    <button class="btn btn-primary" style="width:100%" onclick="admLogin()">Entrar como Admin</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="adm-dashboard" style="display:none">

  <!-- Header -->
  <div style="background:rgba(13,17,23,.98);border-bottom:1px solid rgba(255,255,255,.06);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50">
    <div style="display:flex;align-items:center;gap:.75rem">
      <span style="font-size:1.5rem">🛡️</span>
      <div>
        <h1 style="font-size:1rem;font-weight:900;color:#f1f5f9;margin:0">PDV SaaS Admin</h1>
        <p style="font-size:.7rem;color:#4b5563;margin:0" id="adm-uid-label">uid: —</p>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <button class="btn" style="background:rgba(255,255,255,.05);color:#94a3b8;font-size:.75rem" onclick="loadEmpresas()">
        <i class="fa fa-refresh"></i> Atualizar
      </button>
      <button class="btn btn-danger btn-sm" onclick="admLogout()">Sair</button>
    </div>
  </div>

  <div style="padding:1.5rem;max-width:1200px;margin:0 auto">

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem" id="adm-stats"></div>

    <!-- Toolbar -->
    <div style="display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
      <input class="inp" id="adm-search" type="search" placeholder="Buscar empresa..." style="max-width:260px" oninput="filterEmpresas()">
      <select class="inp" id="adm-filter-plano" style="max-width:160px" onchange="filterEmpresas()">
        <option value="">Todos os planos</option>
        <option value="free">Free</option>
        <option value="basic">Basic</option>
        <option value="pro">Pro</option>
      </select>
      <select class="inp" id="adm-filter-status" style="max-width:160px" onchange="filterEmpresas()">
        <option value="">Todos os status</option>
        <option value="ativo">Ativo</option>
        <option value="inativo">Inativo</option>
      </select>
      <span style="margin-left:auto;font-size:.75rem;color:#4b5563" id="adm-count">— empresas</span>
    </div>

    <!-- Table -->
    <div class="card" style="overflow:hidden">
      <div style="overflow-x:auto">
        <table id="adm-table">
          <thead>
            <tr>
              <th>Empresa</th>
              <th>Email</th>
              <th>Plano</th>
              <th>Expira</th>
              <th>Vendas/mês</th>
              <th>Status</th>
              <th>Cadastro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="adm-tbody">
            <tr><td colspan="8" style="text-align:center;color:#4b5563;padding:2rem">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- MODAL EDITAR EMPRESA -->
<div id="adm-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.8);align-items:center;justify-content:center;padding:1rem">
  <div class="card" style="width:100%;max-width:440px;padding:2rem">
    <h2 style="font-size:1rem;font-weight:900;margin-bottom:1.25rem" id="adm-modal-title">Editar Empresa</h2>

    <div style="margin-bottom:.75rem">
      <label style="font-size:.75rem;color:#6b7280;font-weight:700">Nome da empresa</label>
      <input class="inp" id="edit-nome" style="margin-top:.25rem">
    </div>

    <div style="margin-bottom:.75rem">
      <label style="font-size:.75rem;color:#6b7280;font-weight:700">Plano</label>
      <select class="inp" id="edit-plano" style="margin-top:.25rem">
        <option value="free">Free (Grátis)</option>
        <option value="basic">Basic (R$49/mês)</option>
        <option value="pro">Pro (R$99/mês)</option>
      </select>
    </div>

    <div style="margin-bottom:.75rem">
      <label style="font-size:.75rem;color:#6b7280;font-weight:700">Data de expiração do plano</label>
      <input class="inp" id="edit-expira" type="date" style="margin-top:.25rem">
    </div>

    <div style="margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem">
      <label style="font-size:.75rem;color:#6b7280;font-weight:700">Conta ativa</label>
      <label style="position:relative;display:inline-block;width:44px;height:24px;margin-left:auto">
        <input type="checkbox" id="edit-ativo" style="opacity:0;width:0;height:0">
        <span onclick="document.getElementById('edit-ativo').checked=!document.getElementById('edit-ativo').checked"
          style="position:absolute;inset:0;background:#334155;border-radius:24px;cursor:pointer;transition:.3s"></span>
      </label>
    </div>

    <div style="display:flex;gap:.75rem">
      <button class="btn" style="flex:1;background:rgba(255,255,255,.05);color:#94a3b8" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEmpresa()">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
/* ─── ATENÇÃO: copie a mesma config do saas-auth.js ─────────────── */
import { initializeApp, getApps, getApp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, updateDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ADMIN_CONFIG = {
  apiKey:            "SUA_API_KEY",
  authDomain:        "SEU_PROJETO.firebaseapp.com",
  projectId:         "SEU_PROJETO",
  storageBucket:     "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_SENDER_ID",
  appId:             "SEU_APP_ID",
};
const ADMIN_UID = "SEU_UID_ADMIN"; // Defina após primeiro login

const _app  = getApps().length ? getApp() : initializeApp(ADMIN_CONFIG);
const _auth = getAuth(_app);
const _db   = getFirestore(_app);

const PLANOS_CORES = {
  free:  '#6b7280',
  basic: '#3b82f6',
  pro:   '#a855f7',
  trial_basic: '#f59e0b',
  trial_pro:   '#f59e0b',
};

let _allEmpresas = [];
let _editUid     = null;

/* ─── AUTH ─────────────────────────────────────────────────────── */
window.admLogin = async () => {
  const email = document.getElementById('adm-email').value.trim();
  const pass  = document.getElementById('adm-pass').value;
  try {
    await signInWithEmailAndPassword(_auth, email, pass);
  } catch (err) {
    const el = document.getElementById('adm-err');
    el.textContent = err.message;
    el.style.display = '';
  }
};

window.admLogout = () => signOut(_auth);

onAuthStateChanged(_auth, async (user) => {
  if (!user) {
    document.getElementById('adm-login').style.display    = 'flex';
    document.getElementById('adm-dashboard').style.display = 'none';
    return;
  }

  // Verificar se é admin
  if (ADMIN_UID !== "SEU_UID_ADMIN" && user.uid !== ADMIN_UID) {
    alert('Acesso negado. Conta não autorizada como admin.');
    await signOut(_auth);
    return;
  }

  document.getElementById('adm-login').style.display    = 'none';
  document.getElementById('adm-dashboard').style.display = '';
  document.getElementById('adm-uid-label').textContent   = `uid: ${user.uid}`;

  await loadEmpresas();
});

/* ─── LOAD EMPRESAS ─────────────────────────────────────────────── */
window.loadEmpresas = async () => {
  try {
    const snap = await getDocs(collection(_db, 'empresas'));
    _allEmpresas = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    _allEmpresas.sort((a, b) => (b.criadoEm || '').localeCompare(a.criadoEm || ''));
    renderStats();
    renderTable(_allEmpresas);
  } catch (err) {
    console.error('loadEmpresas:', err);
  }
};

/* ─── STATS ─────────────────────────────────────────────────────── */
function renderStats() {
  const total   = _allEmpresas.length;
  const ativos  = _allEmpresas.filter(e => e.ativo !== false).length;
  const byPlano = { free: 0, basic: 0, pro: 0, trial: 0 };
  _allEmpresas.forEach(e => {
    const k = (e.plano || '').includes('trial') ? 'trial'
            : (e.plano || 'free');
    if (k in byPlano) byPlano[k]++;
  });

  document.getElementById('adm-stats').innerHTML = [
    stat('🏢', 'Total', total, '#3b82f6'),
    stat('✅', 'Ativos', ativos, '#10b981'),
    stat('🆓', 'Free', byPlano.free, '#6b7280'),
    stat('💙', 'Basic', byPlano.basic, '#3b82f6'),
    stat('💜', 'Pro', byPlano.pro, '#a855f7'),
    stat('⏳', 'Trial', byPlano.trial, '#f59e0b'),
  ].join('');
}

function stat(icon, label, val, cor) {
  return `
  <div class="stat-card">
    <div style="font-size:1.5rem;margin-bottom:.25rem">${icon}</div>
    <div style="font-size:1.5rem;font-weight:900;color:${cor}">${val}</div>
    <div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">${label}</div>
  </div>`;
}

/* ─── TABLE ─────────────────────────────────────────────────────── */
function renderTable(list) {
  document.getElementById('adm-count').textContent = `${list.length} empresa${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    document.getElementById('adm-tbody').innerHTML =
      '<tr><td colspan="8" style="text-align:center;color:#4b5563;padding:2rem">Nenhuma empresa encontrada.</td></tr>';
    return;
  }

  document.getElementById('adm-tbody').innerHTML = list.map(e => {
    const planoKey    = e.planoReal || e.plano || 'free';
    const planoCor    = PLANOS_CORES[e.plano || 'free'] || '#6b7280';
    const ativo       = e.ativo !== false;
    const expira      = e.planoExpira ? new Date(e.planoExpira).toLocaleDateString('pt-BR') : '—';
    const expirado    = e.planoExpira && new Date(e.planoExpira) < new Date();
    const criado      = e.criadoEm ? new Date(e.criadoEm).toLocaleDateString('pt-BR') : '—';
    const vendas      = e.vendasMes || 0;

    return `
    <tr>
      <td><span style="font-weight:700">${e.nome || '—'}</span></td>
      <td style="color:#94a3b8;font-size:.78rem">${e.email || '—'}</td>
      <td>
        <span class="badge" style="background:${planoCor}22;color:${planoCor}">
          ${(e.plano || 'free').toUpperCase()}
        </span>
      </td>
      <td style="${expirado ? 'color:#f87171' : 'color:#94a3b8'};font-size:.8rem">
        ${expira}${expirado ? ' ⚠️' : ''}
      </td>
      <td style="color:#94a3b8;font-size:.8rem">${vendas.toLocaleString('pt-BR')}</td>
      <td>
        <span class="badge" style="background:${ativo ? 'rgba(16,185,129,.15)' : 'rgba(239,68,68,.1)'};color:${ativo ? '#34d399' : '#f87171'}">
          ${ativo ? 'Ativo' : 'Inativo'}
        </span>
      </td>
      <td style="color:#6b7280;font-size:.78rem">${criado}</td>
      <td>
        <button class="btn btn-sm" style="background:rgba(59,130,246,.15);color:#60a5fa"
          onclick="openModal('${e.uid}')">
          <i class="fa fa-edit"></i> Editar
        </button>
      </td>
    </tr>`;
  }).join('');
}

/* ─── FILTER ─────────────────────────────────────────────────────── */
window.filterEmpresas = () => {
  const q      = document.getElementById('adm-search').value.toLowerCase();
  const plano  = document.getElementById('adm-filter-plano').value;
  const status = document.getElementById('adm-filter-status').value;

  const filtered = _allEmpresas.filter(e => {
    const matchQ = !q ||
      (e.nome || '').toLowerCase().includes(q) ||
      (e.email || '').toLowerCase().includes(q);
    const matchP = !plano || (e.planoReal || e.plano || '').includes(plano);
    const matchS = !status ||
      (status === 'ativo'   &&  (e.ativo !== false)) ||
      (status === 'inativo' && !(e.ativo !== false));
    return matchQ && matchP && matchS;
  });

  renderTable(filtered);
};

/* ─── MODAL ─────────────────────────────────────────────────────── */
window.openModal = (uid) => {
  const e = _allEmpresas.find(x => x.uid === uid);
  if (!e) return;
  _editUid = uid;

  document.getElementById('adm-modal-title').textContent = `Editando: ${e.nome || uid}`;
  document.getElementById('edit-nome').value    = e.nome || '';
  document.getElementById('edit-plano').value   = e.planoReal || e.plano?.replace('trial_','') || 'free';
  document.getElementById('edit-ativo').checked = e.ativo !== false;

  if (e.planoExpira) {
    document.getElementById('edit-expira').value = e.planoExpira.substring(0,10);
  } else {
    const d = new Date(); d.setMonth(d.getMonth()+1);
    document.getElementById('edit-expira').value = d.toISOString().substring(0,10);
  }

  const modal = document.getElementById('adm-modal');
  modal.style.display = 'flex';
};

window.closeModal = () => {
  document.getElementById('adm-modal').style.display = 'none';
  _editUid = null;
};

window.saveEmpresa = async () => {
  if (!_editUid) return;
  const nome   = document.getElementById('edit-nome').value.trim();
  const plano  = document.getElementById('edit-plano').value;
  const expira = document.getElementById('edit-expira').value;
  const ativo  = document.getElementById('edit-ativo').checked;

  try {
    await updateDoc(doc(_db, 'empresas', _editUid), {
      nome,
      plano,
      planoReal:   plano,
      planoExpira: expira ? new Date(expira).toISOString() : null,
      ativo,
    });
    closeModal();
    await loadEmpresas();
  } catch (err) {
    alert('Erro ao salvar: ' + err.message);
  }
};
</script>
</body>
</html>
